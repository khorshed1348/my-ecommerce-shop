<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - অর্ডার ম্যানেজমেন্ট</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 30px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        .btn-confirm { background-color: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .status-pending { color: #e67e22; font-weight: bold; }
        .status-confirmed { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🛒 কাস্টমার অর্ডার ম্যানেজমেন্ট প্যানেল</h1>
    
    <table>
        <thead>
            <tr>
                <th>আইডি</th>
                <th>প্রোডাক্টের নাম</th>
                <th>মূল্য</th>
                <th>কাস্টমার ফোন</th>
                <th>Transaction ID</th>
                <th>স্ট্যাটাস</th>
                <th>অ্যাকশন</th>
            </tr>
        </thead>
        <tbody id="orderTableBody">
            </tbody>
    </table>

    <script>
        // ব্যাকএন্ড থেকে সব অর্ডারের লিস্ট লোড করা
        function loadOrders() {
            fetch('/api/admin/orders')
                .then(res => res.json())
                .then(orders => {
                    const tbody = document.getElementById('orderTableBody');
                    tbody.innerHTML = ""; // আগের ডাটা পরিষ্কার করা
                    
                    if(orders.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">এখনও কোনো অর্ডার আসেনি।</td></tr>`;
                        return;
                    }

                    orders.forEach(order => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${order.id}</td>
                            <td>${order.productName}</td>
                            <td>৳${order.price}</td>
                            <td>${order.customerPhone}</td>
                            <td><mark>${order.transactionId}</mark></td>
                            <td class="${order.status === 'Pending' ? 'status-pending' : 'status-confirmed'}">${order.status}</td>
                            <td>
                                ${order.status === 'Pending' ? `<button class="btn-confirm" onclick="confirmOrder(${order.id})">Confirm Order</button>` : '✅ সম্পন্ন'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        // অর্ডার কনফার্ম করার ফাংশন
        function confirmOrder(id) {
            fetch('/api/admin/orders/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert("অর্ডারটি সফলভাবে কনফার্ম করা হয়েছে!");
                    loadOrders(); // টেবিল রিফ্রেশ
                }
            });
        }

        // পেজ লোড হলেই অর্ডারগুলো দেখাবে
        window.onload = loadOrders;
    </script>
</body>
</html>
